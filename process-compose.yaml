version: "0.5"

# `process-compose up -D` runs migrations and brings up the four app
# services. Postgres lives outside process-compose — start your own
# (Docker or native) before running this. See docs/development.md.

processes:

  # ---- Migrations -------------------------------------------------------
  # One-shot: applies any pending migrations against the configured
  # database, then exits. App services depend on this via
  # `process_completed_successfully` so the schema is always current
  # before anything reads it. Same binary CI uses for the Cloud Run Job.
  migrate:
    command: cargo run -p observing-migrate
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD:-mysecretpassword}@localhost:5432/observing}
    availability:
      restart: "no"

  # ---- App services -----------------------------------------------------

  species-id:
    command: cargo run -p observing-species-id
    environment:
      - PORT=${SPECIES_ID_PORT:-3005}
      - MODEL_DIR=./models/bioclip
      - ORT_DYLIB_PATH=/opt/homebrew/lib/libonnxruntime.dylib
    readiness_probe:
      http_get:
        host: localhost
        port: ${SPECIES_ID_PORT:-3005}
        path: /health
      initial_delay_seconds: 10
      period_seconds: 5

  appview:
    command: cargo run -p observing-appview
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD:-mysecretpassword}@localhost:5432/observing}
      - PORT=${APPVIEW_PORT:-3000}
      - CACHE_DIR=./cache/media
      - SPECIES_ID_SERVICE_URL=http://localhost:${SPECIES_ID_PORT:-3005}
      - VITE_DEV_SERVER_URL=http://localhost:${VITE_PORT:-5173}
      - PUBLIC_URL=${PUBLIC_URL:-}
    depends_on:
      # migrate must finish first so the schema exists before appview reads it.
      migrate:
        condition: process_completed_successfully
      # appview only calls species-id lazily (the image-ID feature), so it does
      # not need a *healthy* species-id at boot. species-id loads a ~2.4 GB
      # BioCLIP ONNX model and is slow to become healthy; gating on
      # process_started (not process_healthy) lets appview — and the frontend
      # that depends on it — come up immediately instead of waiting on the
      # heavy ML service.
      species-id:
        condition: process_started
    readiness_probe:
      http_get:
        host: localhost
        port: ${APPVIEW_PORT:-3000}
        path: /health
      initial_delay_seconds: 120
      period_seconds: 5

  tap-ingester:
    # Spawns the upstream `tap` Go binary as a child process — it must
    # be on PATH or in the working directory. Install once with
    # ./scripts/install-tap.sh (or see docs/development.md).
    command: cargo run -p tap-ingester
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD:-mysecretpassword}@localhost:5432/observing}
      - TAP_DATABASE_URL=${TAP_DATABASE_URL:-sqlite:./.tap-ingester/tap.db}
      - PORT=${TAP_INGESTER_PORT:-8080}
    depends_on:
      migrate:
        condition: process_completed_successfully
    readiness_probe:
      http_get:
        host: localhost
        port: ${TAP_INGESTER_PORT:-8080}
        path: /health
      initial_delay_seconds: 30
      period_seconds: 5

  frontend:
    command: npm run dev
    environment:
      # Vite reads VITE_PORT for its own listen port and APPVIEW_PORT for the
      # /api proxy target (see frontend/vite.config.ts). Kept in sync with the
      # appview service above so a randomized-port stack stays coherent.
      - VITE_PORT=${VITE_PORT:-5173}
      - APPVIEW_PORT=${APPVIEW_PORT:-3000}
    depends_on:
      appview:
        condition: process_healthy
