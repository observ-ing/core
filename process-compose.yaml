version: "0.5"

# Requires a local PostgreSQL (with PostGIS) reachable on localhost:5432
# before starting. See docs/development.md for setup.

processes:
  appview:
    command: cargo run -p observing-appview
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD}@localhost:5432/observing}
      - PORT=3000
      - CACHE_DIR=./cache/media
      - SPECIES_ID_SERVICE_URL=http://localhost:3005
      - PUBLIC_URL=${PUBLIC_URL:-}
    readiness_probe:
      http_get:
        host: localhost
        port: 3000
        path: /health
      initial_delay_seconds: 120
      period_seconds: 5

  frontend:
    command: npm run dev
    depends_on:
      appview:
        condition: process_healthy

  ingester:
    command: cargo run --bin observing-ingester
    working_dir: crates/observing-ingester
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD}@localhost:5432/observing}

  species-id:
    command: cargo run -p observing-species-id
    environment:
      - PORT=3005
      - MODEL_DIR=./models/bioclip
      - ORT_DYLIB_PATH=/opt/homebrew/lib/libonnxruntime.dylib
    readiness_probe:
      http_get:
        host: localhost
        port: 3005
        path: /health
      initial_delay_seconds: 10

  # Spike: AT Proto Tap sync utility — see docs/architecture.md notes.
  # Signal collection is `bio.lexicons.temp.v0-1.occurrence`; users who only make
  # identifications (no occurrences) won't be auto-discovered by Tap and would
  # need to be added via POST /repos/add.
  tap:
    disabled: true
    command: |
      docker run --rm --init --name observing-tap \
        -p 2480:2480 \
        -v "$PWD/cache/tap:/data" \
        -e TAP_DATABASE_URL=sqlite:///data/tap.db \
        -e TAP_SIGNAL_COLLECTION=bio.lexicons.temp.v0-1.occurrence \
        -e TAP_COLLECTION_FILTERS=bio.lexicons.temp.v0-1.occurrence,bio.lexicons.temp.v0-1.identification,ing.observ.temp.comment,ing.observ.temp.interaction,ing.observ.temp.like \
        -e TAP_NO_REPLAY=true \
        -e TAP_DISABLE_ACKS=true \
        -e TAP_LOG_LEVEL=info \
        ghcr.io/bluesky-social/indigo/tap:latest
    readiness_probe:
      http_get:
        host: localhost
        port: 2480
        path: /health
      initial_delay_seconds: 5
      period_seconds: 5
