version: "0.5"

processes:
  cloud-sql-proxy:
    command: cloud-sql-proxy --port 5432 observ-ing:us-central1:observing-db
    readiness_probe:
      exec:
        command: pg_isready -h localhost -p 5432

  appview:
    command: cargo run -p observing-appview
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD}@localhost:5432/observing}
      - PORT=3000
      - MEDIA_PROXY_URL=http://localhost:3001
      - TAXONOMY_SERVICE_URL=http://localhost:3003
      - SPECIES_ID_SERVICE_URL=http://localhost:3005
      - QUICKSLICE_URL=http://localhost:8090
    readiness_probe:
      http_get:
        host: localhost
        port: 3000
        path: /health
      initial_delay_seconds: 120
      period_seconds: 5
    depends_on:
      cloud-sql-proxy:
        condition: process_healthy

  frontend:
    command: npm run dev
    depends_on:
      appview:
        condition: process_healthy

  media-proxy:
    command: cargo run -p observing-media-proxy
    environment:
      - PORT=3001
      - CACHE_DIR=./cache/media
    readiness_probe:
      http_get:
        host: localhost
        port: 3001
        path: /health

  quickslice:
    command: docker compose -f docker-compose.quickslice.yml up --build
    readiness_probe:
      http_get:
        host: localhost
        port: 8090
        path: /
      initial_delay_seconds: 30
      period_seconds: 5

  taxonomy:
    command: cargo run -p observing-taxonomy
    environment:
      - PORT=3003
    readiness_probe:
      http_get:
        host: localhost
        port: 3003
        path: /health

  species-id:
    command: cargo run -p observing-species-id
    environment:
      - PORT=3005
      - MODEL_DIR=./models/bioclip
      - ORT_DYLIB_PATH=/opt/homebrew/lib/libonnxruntime.dylib
    readiness_probe:
      http_get:
        host: localhost
        port: 3005
        path: /health
      initial_delay_seconds: 10
