services:
  quickslice:
    build: ./vendor/quickslice
    ports:
      - "8090:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://quickslice:quickslice@quickslice-postgres:5432/quickslice?sslmode=disable
      - SECRET_KEY_BASE=Xdb/9oovpIzYRKPjfTm45QSWYyYJi35GY3n4475SBVmcyxHS9tMoFJcOwPGfA0xW
      - JETSTREAM_DISABLE_CURSOR=true
      - EXTERNAL_BASE_URL=http://127.0.0.1:8090
      - OAUTH_SIGNING_KEY=z42tsNCXT8jZHj37qRd1D1vBE4qns8rp43DZsm1uez3cr8h6
      - OAUTH_LOOPBACK_MODE=true
    restart: on-failure:5
    depends_on:
      quickslice-postgres:
        condition: service_healthy

  quickslice-postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=quickslice
      - POSTGRES_PASSWORD=quickslice
      - POSTGRES_DB=quickslice
    volumes:
      - quickslice-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickslice"]
      interval: 2s
      timeout: 5s
      retries: 10

  quickslice-lexicon-loader:
    image: postgres:16-alpine
    depends_on:
      quickslice-postgres:
        condition: service_healthy
    volumes:
      - ./lexicons:/lexicons:ro
      - ./scripts/load-quickslice-lexicons.sh:/load.sh:ro
    entrypoint: ["/bin/sh", "/load.sh"]
    environment:
      - PGHOST=quickslice-postgres
      - PGUSER=quickslice
      - PGPASSWORD=quickslice
      - PGDATABASE=quickslice

volumes:
  quickslice-postgres-data:
