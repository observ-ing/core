[package]
name = "tap-ingester"
version = "0.1.0"
edition = "2021"
description = "AT Protocol ingester sourced from a Tap (indigo cmd/tap) instance"
license = "MIT OR Apache-2.0"

[dependencies]
# Tap client wrapper — handles WebSocket + ack handshake + reconnection.
tapped = { workspace = true }

# Database write path (shared processing module).
observing-db = { path = "../observing-db", features = ["processing"] }
observing-lexicons = { path = "../observing-lexicons" }

# Media resolver: AT URI parsing + DID → PDS resolution + HTTP fetch.
at-uri-parser = { path = "../at-uri-parser" }
atproto-blob-resolver = { path = "../atproto-blob-resolver" }
atproto-identity = { path = "../atproto-identity" }

# Async runtime
tokio = { workspace = true }

# HTTP server (combined ingester + Tap status dashboard).
axum = { workspace = true }
tower-http = { workspace = true }

# HTTP client used by the media resolver
reqwest = { workspace = true }

# Database
sqlx = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-stackdriver = { workspace = true }

# Time
chrono = { workspace = true }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# URL utilities (used by media resolver)
url = { workspace = true }
urlencoding = { workspace = true }

[[bin]]
name = "tap-ingester"
path = "src/main.rs"
