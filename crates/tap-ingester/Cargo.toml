[package]
name = "tap-ingester"
version = "0.1.0"
edition = "2021"
description = "AT Protocol ingester sourced from a Tap (indigo cmd/tap) instance"
license = "MIT OR Apache-2.0"

[dependencies]
# Tap client wrapper — handles WebSocket + ack handshake + reconnection.
tapped = { workspace = true }

# Database write path — record dispatch goes through observing-db's
# `processing` module to share parsing logic with the appview write path.
observing-db = { path = "../observing-db", features = ["processing"] }

# associatedMedia strong-ref → blob resolution
atproto-identity = { path = "../atproto-identity" }
at-uri-parser = { path = "../at-uri-parser" }
atproto-blob-resolver = { path = "../atproto-blob-resolver" }

# Async runtime
tokio = { workspace = true }

# Database
sqlx = { workspace = true }

# HTTP server (for /health + dashboard)
axum = { workspace = true }
tower-http = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-stackdriver = { workspace = true }

# Time
chrono = { workspace = true }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# HTTP client (media resolver fetches records from PDSes)
reqwest = { workspace = true }

# URL utilities
url = { workspace = true }
urlencoding = { workspace = true }

[dev-dependencies]
tower = { workspace = true, features = ["util"] }

[[bin]]
name = "tap-ingester"
path = "src/main.rs"
