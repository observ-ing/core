[package]
name = "tap-ingester"
version = "0.1.0"
edition = "2021"
description = "AT Protocol ingester sourced from a Tap (indigo cmd/tap) instance"
license = "MIT OR Apache-2.0"

[dependencies]
# Tap client wrapper — handles WebSocket + ack handshake + reconnection.
tapped = { workspace = true }

# Shared HTTP server bootstrap (bind + serve for the dashboard).
observing-bootstrap = { path = "../observing-bootstrap" }

# Database write path (shared processing module).
observing-db = { path = "../observing-db", features = ["processing"] }
observing-lexicons = { path = "../observing-lexicons" }
# Canonical collection NSIDs (Tap filters + record-dispatch keys).
observing-collections = { path = "../observing-collections" }

# Postgres connection URL from env (DATABASE_URL or DB_* / Cloud SQL socket)
pg-url-env = { path = "../pg-url-env" }

# Media resolver: AT URI parsing + DID → PDS resolution + HTTP fetch.
jacquard-common = "0.12"
atproto-blob-resolver = { path = "../atproto-blob-resolver" }
atproto-identity = { path = "../atproto-identity" }

# Async runtime
tokio = { workspace = true }

# HTTP server (combined ingester + Tap status dashboard).
axum = { workspace = true }
tower-http = { workspace = true }

# HTTP client used by the media resolver
reqwest = { workspace = true }

# Firehose lag probe: a short-lived subscribeRepos connection at the current
# cursor to read the relay's commit time (heartbeat turns it into lag_seconds).
# tokio-tungstenite is already in the tree transitively; pin the same 0.28 line.
# native-tls (not rustls) to match sqlx's TLS stack and sidestep rustls 0.23's
# manual-CryptoProvider requirement.
tokio-tungstenite = { version = "0.28", default-features = false, features = ["connect", "native-tls"] }
futures-util = "0.3"
# Decode the two concatenated CBOR objects (header + body) of a firehose frame.
ciborium = "0.2"

# Database
sqlx = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-stackdriver = { workspace = true }

# Time
chrono = { workspace = true }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# URL utilities
url = { workspace = true }

[[bin]]
name = "tap-ingester"
path = "src/main.rs"
