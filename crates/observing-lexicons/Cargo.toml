[package]
name = "observing-lexicons"
version = "0.1.0"
edition = "2021"
description = "Generated AT Protocol record types from lexicon schemas"
license = "AGPL-3.0-only"

[features]
default = ["bio_lexicons", "com_atproto", "ing_observ", "org_rwell"]
bio_lexicons = ["com_atproto"]
com_atproto = []
ing_observ = ["com_atproto"]
org_rwell = ["com_atproto"]

[lints.rust]
non_snake_case = "allow"

[lints.clippy]
all = "allow"

[dependencies]
jacquard-common = "0.11"
jacquard-derive = "0.11"
jacquard-lexicon = "0.11"
rustversion = "1"
serde = { workspace = true }
