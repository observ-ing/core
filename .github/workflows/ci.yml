name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  # Node.js jobs
  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high

  ts-bindings-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Check generated TypeScript bindings
        run: |
          cargo test -p observing-appview -- export_bindings
          npx oxfmt frontend/src/bindings
          git diff --exit-code frontend/src/bindings/

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run fmt:check

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  ts-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --project tsconfig.json

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  # Spike: assemble a debug Android APK by wrapping the existing web bundle
  # in a Capacitor shell. Validates that `npm run build` output drops into a
  # native target without touching web code. The `android/` dir is gitignored
  # and regenerated each run via `npx cap add android`. See PR #403, #273, #388.
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
      - uses: gradle/actions/setup-gradle@v4
      - run: npm ci
      # Match the release workflow so this artifact reflects the same bundle
      # users would get from a tagged release.
      - run: npm run build
        env:
          VITE_API_URL: https://observ.ing
      - run: npx cap add android
      - run: npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # Enforce that every component in frontend/src/components has a sibling
  # *.stories.tsx file. Catches new components that ship without a story.
  storybook-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm run check:stories

  # Build Storybook on every PR so a broken story fails the merge gate.
  # On push to main the static output is uploaded as an artifact for
  # `storybook-deploy` to publish.
  storybook-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build-storybook
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 1

  # Bundle the static Storybook output into a small static-web-server image
  # and deploy it to Cloud Run on push to main. Cheaper than an HTTPS load
  # balancer in front of GCS — cold starts are fine for a dev tool, and
  # the free tier covers our traffic.
  storybook-deploy:
    runs-on: ubuntu-latest
    needs: [storybook-build]
    if: github.event_name == 'push'
    env:
      REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/storybook
      REGION: us-central1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        id: gcp-auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.storybook
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/storybook:${{ github.sha }},${{ env.REGISTRY }}/storybook:latest
          cache-from: type=gha,scope=storybook
          cache-to: type=gha,mode=max,scope=storybook

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy storybook \
            --image=$REGISTRY/storybook:${{ github.sha }} \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=128Mi \
            --cpu=1 \
            --max-instances=3 \
            --min-instances=0

  # Rust jobs
  rust-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check --locked

  rust-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  rust-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  rust-sqlx:
    runs-on: ubuntu-latest
    # sqlx-cli 0.9 `prepare --check` requires a live database connection; the
    # offline-without-DB mode that 0.8.x supported is gone. Stand up the same
    # Postgres service the e2e/test jobs use and run migrations first so the
    # query macros can re-describe against the real schema.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: observing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/observing
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          # Pinned: sqlx-cli 0.9.0 requires rustc >=1.94, satisfied by the
          # rust-toolchain.toml pin. Workspace uses sqlx 0.9.x, so 0.9.0
          # matches. Bump in lockstep when the toolchain pin moves.
          tool: sqlx-cli@0.9.0
          no-default-features: true
          features: postgres
      - name: Run database migrations
        # Sets the database-level search_path (ingester, appview, public) so
        # the unqualified table names in the query macros resolve.
        run: sqlx migrate run --source crates/observing-db/migrations
      - run: cargo sqlx prepare --workspace --check

  rust-lexicons-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Install jacquard-lexgen
        run: RUSTFLAGS="" cargo install jacquard-lexgen --version 0.12.1 --locked
      - name: Check generated lexicon types are up to date
        run: |
          ./scripts/generate-rust-types.sh
          cargo fmt -p observing-lexicons
          cargo check -p observing-lexicons
          git diff --exit-code crates/observing-lexicons/src/

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # End-to-end tests
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: observing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/observing
      # tap-ingester writes Tap's cursor DB here (three-slash = absolute path,
      # which Tap's sqlite parser expects).
      TAP_DATABASE_URL: sqlite:///tmp/tap.db
      # Surface Tap's stdout/stderr (via tap-ingester) so dev-env startup
      # failures are debuggable; tapped defaults this to /dev/null.
      TAP_INHERIT_STDIO: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      # Pre-build the binaries process-compose.devenv.yaml launches via
      # `cargo run` (migrate, appview, tap-ingester) so the stack comes up well
      # within its readiness probes. Migrations run inside the stack (the
      # `migrate` process), so no separate sqlx step is needed.
      - name: Build appview, tap-ingester, migrate
        run: cargo build -p observing-appview -p tap-ingester -p observing-migrate
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build and install upstream `tap`
        # Same indigo commit the production Dockerfile pins.
        env:
          INDIGO_REV: ce62b8fce9e01434213a69cb251852b2c9436cb9
        run: |
          mkdir -p /tmp/indigo && cd /tmp/indigo
          git init . >/dev/null
          git remote add origin https://github.com/bluesky-social/indigo.git
          git fetch --depth 1 origin "$INDIGO_REV"
          git checkout FETCH_HEAD
          GODEBUG=netdns=go go build -tags timetzdata -o /usr/local/bin/tap ./cmd/tap
      - name: Install process-compose
        # The dev-env orchestrator (scripts/e2e-devenv.ts) brings the Rust stack
        # up via process-compose.devenv.yaml.
        env:
          PC_VERSION: v1.116.0
        run: |
          curl -fsSL "https://github.com/F1bonacc1/process-compose/releases/download/${PC_VERSION}/process-compose_linux_amd64.tar.gz" \
            | tar -xz -C /tmp process-compose
          sudo install /tmp/process-compose /usr/local/bin/process-compose
          process-compose version
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run isolated dev-env e2e + integration tests
        # Boots a local @atproto/dev-env network (PLC + PDS + firehose), points
        # the Rust stack at it via process-compose.devenv.yaml, then runs the
        # mocked integration suite plus the dev-env CRUD e2e (playwright.devenv.
        # config.ts). No test data ever reaches the public network, so no
        # BLUESKY_* credentials are needed. @atproto/dev-env is fetched on demand
        # rather than vendored — see frontend/tests/dev-env/network.ts. The
        # orchestrator inherits stdio, so service logs stream to this job's
        # output on failure.
        run: npm run test:e2e:devenv
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Build Docker images in parallel with caching
  build-images:
    runs-on: ubuntu-latest
    needs: [frontend-audit, fmt, frontend-lint, ts-bindings-check, ts-typecheck, frontend-build, rust-lockfile, rust-fmt, rust-deny, rust-clippy, rust-sqlx, rust-lexicons-check, rust-test, e2e]
    if: github.event_name == 'push'
    env:
      REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/observing
    strategy:
      matrix:
        include:
          - { service: observing-appview, image: observing-appview }
          - { service: observing-species-id, image: observing-species-id }
          # Same binary as observing-species-id, but the faster ViT-L model
          # bundle is baked in via build-args (different SPECIES_MODEL_URL +
          # MODEL_VERSION). Serves the live camera loop; the appview routes to
          # it via SPECIES_ID_LIVE_SERVICE_URL.
          - service: observing-species-id
            image: observing-species-id-live
            extra_build_args: |
              SPECIES_MODEL_URL=https://github.com/observ-ing/bioclip-models/releases/download/vit-l-v1.0.0/bioclip-2-vit-l-models.tar.gz
              MODEL_VERSION=bioclip-2-vit-l-14
          - { service: observing-migrate, image: observing-migrate }
          - { service: tap-ingester, image: tap-ingester }
          - { service: observing-task-runner, image: observing-task-runner }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        id: gcp-auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # VITE_MAPTILER_KEY is consumed only by the appview frontend build
          # (other services prune that stage). Must be a key allowed for
          # https://observ.ing. Unset → map falls back to keyless CARTO tiles.
          # extra_build_args is empty for all but observing-species-id-live,
          # which appends SPECIES_MODEL_URL + MODEL_VERSION.
          build-args: |
            SERVICE=${{ matrix.service }}
            VITE_MAPTILER_KEY=${{ secrets.VITE_MAPTILER_KEY }}
            ${{ matrix.extra_build_args }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          cache-from: |
            type=gha,scope=${{ matrix.image }}
            type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.image }}
            type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-images]
    environment:
      name: production
      url: ${{ steps.deploy-appview.outputs.url }}
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/observing
      REGION: us-central1
      PUBLIC_URL: https://observ.ing
      # tap-ingester's Cloud Run custom domain; the appview reads its
      # /api/stats + /api/tap-stats to render the ingester/* admin tables.
      INGESTER_URL: https://ingester.observ.ing
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy species-id
        run: |
          gcloud run deploy observing-species-id \
            --image=$REGISTRY/observing-species-id:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --cpu=2 \
            --memory=8Gi \
            --cpu-boost \
            --min-instances=1 \
            --startup-probe=tcpSocket.port=8080,periodSeconds=10,failureThreshold=30,timeoutSeconds=5 \
            --set-env-vars=RUST_LOG=observing_species_id=info,LOG_FORMAT=json

      # Faster ViT-L service for the live camera loop. Same flags as
      # observing-species-id but only 4 GiB — the ViT-L bundle's resident
      # footprint is ~3 GB (vs ViT-H's ~4.4 GB), so half the memory of the full
      # service is enough. MODEL_VERSION is already baked into the image.
      - name: Deploy species-id-live
        run: |
          gcloud run deploy observing-species-id-live \
            --image=$REGISTRY/observing-species-id-live:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --cpu=2 \
            --memory=4Gi \
            --cpu-boost \
            --min-instances=1 \
            --startup-probe=tcpSocket.port=8080,periodSeconds=10,failureThreshold=30,timeoutSeconds=5 \
            --set-env-vars=RUST_LOG=observing_species_id=info,LOG_FORMAT=json

      - name: Get service URLs
        id: urls
        run: |
          echo "species_id=$(gcloud run services describe observing-species-id --region=$REGION --format='value(status.url)')" >> $GITHUB_OUTPUT
          echo "species_id_live=$(gcloud run services describe observing-species-id-live --region=$REGION --format='value(status.url)')" >> $GITHUB_OUTPUT

      # Apply pending DB migrations as a one-shot Cloud Run Job *before* any
      # runtime service comes up with the new schema. The job connects as
      # postgres (superuser) via `observing-db-admin-url`; no long-running
      # service holds that credential.
      - name: Run migrations
        run: |
          gcloud run jobs deploy observing-migrate \
            --image=$REGISTRY/observing-migrate:latest \
            --region=$REGION \
            --set-cloudsql-instances=$PROJECT_ID:$REGION:observing-db \
            --set-secrets=DATABASE_URL=observing-db-admin-url:latest \
            --max-retries=0 \
            --task-timeout=600
          gcloud run jobs execute observing-migrate \
            --region=$REGION \
            --wait

      # One-shot operational tasks (backfills, ledger replays). Deployed as a
      # Cloud Run Job but deliberately NOT executed here — an operator triggers
      # a run on demand, e.g.
      #   gcloud run jobs execute observing-task-runner --region=us-central1 \
      #     --wait --args=backfill-occurrences,--dry-run,--all
      # Runs as the ingester role (same writes as the firehose path), so no
      # admin credential and no DB URL ever leaves the cluster.
      - name: Deploy task-runner
        run: |
          gcloud run jobs deploy observing-task-runner \
            --image=$REGISTRY/observing-task-runner:latest \
            --region=$REGION \
            --set-cloudsql-instances=$PROJECT_ID:$REGION:observing-db \
            --set-env-vars=RUST_LOG=observing_task_runner=info,DB_HOST=/cloudsql/$PROJECT_ID:$REGION:observing-db,DB_NAME=observing,DB_USER=ingester_runtime \
            --set-secrets=DB_PASSWORD=observing-db-ingester-password:latest \
            --max-retries=0 \
            --task-timeout=3600

      # --no-cpu-throttling is load-bearing here, not a tuning knob. Cloud
      # Run's default ("CPU only during request processing") throttles the
      # instance to ~0 CPU whenever no HTTP request is in flight. But the
      # ingester does all its work in a long-running background loop (consume
      # the full network firehose via the embedded Tap, filter, upsert) — it
      # is not request-driven. Under the default the consumer is CPU-starved,
      # caps at a few hundred events/s, can't keep pace with the live
      # firehose, and falls irrecoverably behind the relay's ~72h retention
      # window (see incident 2026-05-31). always-allocated CPU lets the loop
      # run at full speed. --cpu=2 gives headroom for decoding every event on
      # the network (CBOR decode is CPU-bound). min/max-instances=1 keeps it a
      # singleton so there's exactly one consumer per cursor.
      - name: Deploy tap-ingester
        run: |
          gcloud run deploy tap-ingester \
            --image=$REGISTRY/tap-ingester:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --cpu=2 \
            --no-cpu-throttling \
            --memory=2Gi \
            --add-cloudsql-instances=$PROJECT_ID:$REGION:observing-db \
            --set-env-vars=RUST_LOG=tap_ingester=info,DB_HOST=/cloudsql/$PROJECT_ID:$REGION:observing-db,DB_NAME=observing,DB_USER=ingester_runtime,TAP_MAX_DB_CONNS=10,TAP_INHERIT_STDIO=1 \
            --set-secrets=DB_PASSWORD=observing-db-ingester-password:latest \
            --min-instances=1 \
            --max-instances=1 \
            --timeout=3600

      - name: Deploy appview
        id: deploy-appview
        run: |
          URL=$(gcloud run deploy observing-appview \
            --image=$REGISTRY/observing-appview:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --add-cloudsql-instances=$PROJECT_ID:$REGION:observing-db \
            --set-env-vars="^|^DB_HOST=/cloudsql/$PROJECT_ID:$REGION:observing-db|DB_NAME=observing|DB_USER=appview_runtime|PUBLIC_URL=$PUBLIC_URL|SPECIES_ID_SERVICE_URL=${{ steps.urls.outputs.species_id }}|SPECIES_ID_LIVE_SERVICE_URL=${{ steps.urls.outputs.species_id_live }}|INGESTER_URL=$INGESTER_URL|HIDDEN_DIDS=did:plc:jh6n3ntljfhhtr4jbvrm3k5b|ADMIN_DIDS=did:plc:vozr2os4b4sxrxr6opde5js5|CORS_ORIGINS=https://observ.ing,https://localhost,capacitor://localhost" \
            --set-secrets=DB_PASSWORD=observing-db-appview-password:latest \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
