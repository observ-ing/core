name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  # Node.js jobs
  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high

  ts-bindings-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Check generated TypeScript bindings
        run: |
          cargo test -p observing-appview -- export_bindings
          npx oxfmt frontend/src/bindings
          git diff --exit-code frontend/src/bindings/

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run fmt:check

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  ts-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --project tsconfig.json

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  # Rust jobs
  rust-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check --locked

  rust-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  rust-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  rust-sqlx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: sqlx-cli
          no-default-features: true
          features: postgres
      - working-directory: crates/observing-ingester
        run: cargo sqlx prepare --check

  rust-lexicons-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: jacquard-lexgen@0.11.1
      - name: Check generated lexicon types are up to date
        run: |
          ./scripts/generate-rust-types.sh
          cargo fmt -p observing-lexicons
          cargo check -p observing-lexicons
          # TODO: restore git diff --exit-code once jacquard-codegen produces deterministic output
          # https://tangled.org/nonbinary.computer/jacquard/issues/TODO
          # git diff --exit-code crates/observing-lexicons/src/

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # End-to-end tests
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: observing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/observing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - name: Run database migrations and seed
        run: |
          for f in crates/observing-db/migrations/*.sql; do psql $DATABASE_URL -f "$f"; done
          psql $DATABASE_URL -f tests/seed.sql
      - name: Build frontend
        run: npm run build
      - name: Build appview and taxonomy service
        run: cargo build -p observing-appview -p observing-taxonomy
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Start services
        run: |
          ./target/debug/observing-taxonomy &
          PORT=3000 ./target/debug/observing-appview &
      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3003/health 2>/dev/null && curl -sf http://127.0.0.1:3000/health 2>/dev/null && exit 0
            sleep 2
          done
          echo "Services failed to start"
          exit 1
      - name: Run integration & e2e tests
        run: npm run test
        env:
          BLUESKY_TEST_EMAIL: ${{ secrets.BLUESKY_TEST_EMAIL }}
          BLUESKY_TEST_PASSWORD: ${{ secrets.BLUESKY_TEST_PASSWORD }}
          BLUESKY_TEST_HANDLE: ${{ secrets.BLUESKY_TEST_HANDLE }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Build Docker images in parallel with caching
  build-images:
    runs-on: ubuntu-latest
    needs: [frontend-audit, fmt, frontend-lint, ts-bindings-check, ts-typecheck, frontend-build, rust-lockfile, rust-fmt, rust-deny, rust-clippy, rust-sqlx, rust-lexicons-check, rust-test, e2e]
    if: github.event_name == 'push'
    env:
      REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/observing
    strategy:
      matrix:
        service: [appview, ingester, media-proxy, species-id, taxonomy]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        id: gcp-auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=observing-${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/observing-${{ matrix.service }}:latest
          cache-from: |
            type=gha,scope=${{ matrix.service }}
            type=registry,ref=${{ env.REGISTRY }}/observing-${{ matrix.service }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.service }}
            type=registry,ref=${{ env.REGISTRY }}/observing-${{ matrix.service }}:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-images]
    environment:
      name: production
      url: ${{ steps.deploy-appview.outputs.url }}
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/observing
      REGION: us-central1
      PUBLIC_URL: https://observ.ing
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy media-proxy
        run: |
          gcloud run deploy observing-media-proxy \
            --image=$REGISTRY/observing-media-proxy:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --set-env-vars=RUST_LOG=observing_media_proxy=info,LOG_FORMAT=json

      - name: Deploy taxonomy
        run: |
          gcloud run deploy observing-taxonomy \
            --image=$REGISTRY/observing-taxonomy:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --set-env-vars=RUST_LOG=observing_taxonomy=info,LOG_FORMAT=json

      - name: Deploy species-id
        run: |
          gcloud run deploy observing-species-id \
            --image=$REGISTRY/observing-species-id:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --cpu=2 \
            --memory=4Gi \
            --cpu-boost \
            --timeout=300 \
            --set-env-vars=RUST_LOG=observing_species_id=info,LOG_FORMAT=json

      - name: Get service URLs
        id: urls
        run: |
          echo "media_proxy=$(gcloud run services describe observing-media-proxy --region=$REGION --format='value(status.url)')" >> $GITHUB_OUTPUT
          echo "taxonomy=$(gcloud run services describe observing-taxonomy --region=$REGION --format='value(status.url)')" >> $GITHUB_OUTPUT
          echo "species_id=$(gcloud run services describe observing-species-id --region=$REGION --format='value(status.url)')" >> $GITHUB_OUTPUT

      - name: Deploy appview
        id: deploy-appview
        run: |
          URL=$(gcloud run deploy observing-appview \
            --image=$REGISTRY/observing-appview:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --add-cloudsql-instances=$PROJECT_ID:$REGION:observing-db \
            --set-env-vars=DB_HOST=/cloudsql/$PROJECT_ID:$REGION:observing-db,DB_NAME=observing,DB_USER=postgres,PUBLIC_URL=$PUBLIC_URL,MEDIA_PROXY_URL=${{ steps.urls.outputs.media_proxy }},TAXONOMY_SERVICE_URL=${{ steps.urls.outputs.taxonomy }},SPECIES_ID_SERVICE_URL=${{ steps.urls.outputs.species_id }},HIDDEN_DIDS=did:plc:jh6n3ntljfhhtr4jbvrm3k5b \
            --set-secrets=DB_PASSWORD=observing-db-password:latest \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Deploy ingester
        run: |
          gcloud run deploy observing-ingester \
            --image=$REGISTRY/observing-ingester:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --cpu=1 \
            --memory=2Gi \
            --add-cloudsql-instances=$PROJECT_ID:$REGION:observing-db \
            --set-env-vars=RUST_LOG=observing_ingester=info,DB_HOST=/cloudsql/$PROJECT_ID:$REGION:observing-db,DB_NAME=observing,DB_USER=postgres,JETSTREAM_URL=wss://jetstream2.us-east.bsky.network/subscribe \
            --set-secrets=DB_PASSWORD=observing-db-password:latest \
            --min-instances=1 \
            --max-instances=1 \
            --timeout=3600
