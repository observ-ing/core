name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  # Node.js jobs
  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high

  ts-bindings-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Check generated TypeScript bindings
        run: |
          cargo test -p observing-appview -- export_bindings
          npx oxfmt frontend/src/bindings
          git diff --exit-code frontend/src/bindings/

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run fmt:check

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  ts-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --project tsconfig.json

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  # Spike: assemble a debug Android APK by wrapping the existing web bundle
  # in a Capacitor shell. Validates that `npm run build` output drops into a
  # native target without touching web code. The `android/` dir is gitignored
  # and regenerated each run via `npx cap add android`. See PR #403, #273, #388.
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
      - uses: gradle/actions/setup-gradle@v4
      - run: npm ci
      - run: npm run build
      - run: npx cap add android
      - run: npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # Spike: boot a headless x86_64 Android emulator with KVM acceleration,
  # install the APK from android-build, launch the WebView shell, and
  # capture a screenshot + logcat. Confirms the bundled web code at least
  # paints inside the Capacitor shell before we invest more in the EXIF
  # integration path. Doesn't validate API-dependent flows (no network to
  # observ.ing's appview during the smoke test).
  android-emulator-smoke-test:
    runs-on: ubuntu-latest
    needs: [android-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Boot emulator and capture WebView shell
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot-save
          script: |
            adb install -r app-debug.apk
            adb shell am start -n ing.observ.app/.MainActivity
            sleep 20
            adb shell screencap -p /sdcard/screen.png
            adb pull /sdcard/screen.png screen.png
            adb logcat -d > logcat.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-emulator-smoke-test
          path: |
            screen.png
            logcat.txt
          retention-days: 7

  # Enforce that every component in frontend/src/components has a sibling
  # *.stories.tsx file. Catches new components that ship without a story.
  storybook-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm run check:stories

  # Build Storybook on every PR so a broken story fails the merge gate.
  # On push to main the static output is uploaded as an artifact for
  # `storybook-deploy` to publish.
  storybook-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build-storybook
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 1

  # Bundle the static Storybook output into a small static-web-server image
  # and deploy it to Cloud Run on push to main. Cheaper than an HTTPS load
  # balancer in front of GCS — cold starts are fine for a dev tool, and
  # the free tier covers our traffic.
  storybook-deploy:
    runs-on: ubuntu-latest
    needs: [storybook-build]
    if: github.event_name == 'push'
    env:
      REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/storybook
      REGION: us-central1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        id: gcp-auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.storybook
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/storybook:${{ github.sha }},${{ env.REGISTRY }}/storybook:latest
          cache-from: type=gha,scope=storybook
          cache-to: type=gha,mode=max,scope=storybook

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy storybook \
            --image=$REGISTRY/storybook:${{ github.sha }} \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=128Mi \
            --cpu=1 \
            --max-instances=3 \
            --min-instances=0

  # Rust jobs
  rust-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check --locked

  rust-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  rust-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  rust-sqlx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: sqlx-cli
          no-default-features: true
          features: postgres
      - working-directory: crates/observing-ingester
        run: cargo sqlx prepare --check

  rust-lexicons-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Install jacquard-codegen from fork (deterministic field ordering fix)
        run: RUSTFLAGS="" cargo install --git https://tangled.org/rwell.org/jacquard.git --branch fix-builder-determinism jacquard-lexgen
      - name: Check generated lexicon types are up to date
        run: |
          ./scripts/generate-rust-types.sh
          cargo fmt -p observing-lexicons
          cargo check -p observing-lexicons
          git diff --exit-code crates/observing-lexicons/src/

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # Backfill: fetch real PDS records, parse, and write to a test database
  backfill:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: observing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/observing
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Run database migrations
        run: for f in crates/observing-db/migrations/*.sql; do psql $DATABASE_URL -f "$f"; done
      - name: Backfill from PDS
        run: cargo run --bin backfill -- did:plc:jh6n3ntljfhhtr4jbvrm3k5b

  # End-to-end tests
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: observing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/observing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: sqlx-cli
          no-default-features: true
          features: postgres
      - name: Run database migrations and seed
        run: |
          sqlx migrate run --source crates/observing-db/migrations
          psql $DATABASE_URL -f tests/seed.sql
      - name: Build frontend
        run: npm run build
      - name: Build appview
        run: cargo build -p observing-appview
      - name: Build ingester
        run: cargo build -p observing-ingester --bin observing-ingester
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Start services
        run: |
          PORT=3000 ./target/debug/observing-appview > /tmp/appview.log 2>&1 &
          PORT=8090 ./target/debug/observing-ingester > /tmp/ingester.log 2>&1 &
      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3000/health 2>/dev/null && exit 0
            sleep 2
          done
          echo "Services failed to start"
          exit 1
      - name: Run integration & e2e tests
        run: npm run test
        env:
          BLUESKY_TEST_EMAIL: ${{ secrets.BLUESKY_TEST_EMAIL }}
          BLUESKY_TEST_PASSWORD: ${{ secrets.BLUESKY_TEST_PASSWORD }}
          BLUESKY_TEST_HANDLE: ${{ secrets.BLUESKY_TEST_HANDLE }}
      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "===== appview log ====="
          tail -200 /tmp/appview.log || true
          echo
          echo "===== ingester log ====="
          tail -200 /tmp/ingester.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Build Docker images in parallel with caching
  build-images:
    runs-on: ubuntu-latest
    needs: [frontend-audit, fmt, frontend-lint, ts-bindings-check, ts-typecheck, frontend-build, rust-lockfile, rust-fmt, rust-deny, rust-clippy, rust-sqlx, rust-lexicons-check, rust-test, e2e]
    if: github.event_name == 'push'
    env:
      REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/observing
    strategy:
      matrix:
        service: [appview, ingester, species-id, migrate]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        id: gcp-auth
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=observing-${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/observing-${{ matrix.service }}:latest
          cache-from: |
            type=gha,scope=${{ matrix.service }}
            type=registry,ref=${{ env.REGISTRY }}/observing-${{ matrix.service }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.service }}
            type=registry,ref=${{ env.REGISTRY }}/observing-${{ matrix.service }}:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-images]
    environment:
      name: production
      url: ${{ steps.deploy-appview.outputs.url }}
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/observing
      REGION: us-central1
      PUBLIC_URL: https://observ.ing
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy species-id
        run: |
          gcloud run deploy observing-species-id \
            --image=$REGISTRY/observing-species-id:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --cpu=2 \
            --memory=8Gi \
            --cpu-boost \
            --min-instances=1 \
            --startup-probe=tcpSocket.port=8080,periodSeconds=10,failureThreshold=30,timeoutSeconds=5 \
            --set-env-vars=RUST_LOG=observing_species_id=info,LOG_FORMAT=json

      - name: Get service URLs
        id: urls
        run: |
          echo "species_id=$(gcloud run services describe observing-species-id --region=$REGION --format='value(status.url)')" >> $GITHUB_OUTPUT

      # Apply pending DB migrations as a one-shot Cloud Run Job *before* any
      # runtime service comes up with the new schema. The job connects as
      # postgres (superuser) via `observing-db-admin-url`; no long-running
      # service holds that credential.
      - name: Run migrations
        run: |
          gcloud run jobs deploy observing-migrate \
            --image=$REGISTRY/observing-migrate:latest \
            --region=$REGION \
            --set-cloudsql-instances=$PROJECT_ID:$REGION:observing-db \
            --set-secrets=DATABASE_URL=observing-db-admin-url:latest \
            --max-retries=0 \
            --task-timeout=600
          gcloud run jobs execute observing-migrate \
            --region=$REGION \
            --wait

      - name: Deploy ingester
        run: |
          gcloud run deploy observing-ingester \
            --image=$REGISTRY/observing-ingester:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --cpu=1 \
            --memory=2Gi \
            --add-cloudsql-instances=$PROJECT_ID:$REGION:observing-db \
            --set-env-vars=RUST_LOG=observing_ingester=info,DB_HOST=/cloudsql/$PROJECT_ID:$REGION:observing-db,DB_NAME=observing,DB_USER=ingester_runtime,JETSTREAM_URL=wss://jetstream2.us-east.bsky.network/subscribe \
            --set-secrets=DB_PASSWORD=observing-db-ingester-password:latest \
            --min-instances=1 \
            --max-instances=1 \
            --timeout=3600

      - name: Deploy appview
        id: deploy-appview
        run: |
          URL=$(gcloud run deploy observing-appview \
            --image=$REGISTRY/observing-appview:latest \
            --region=$REGION \
            --allow-unauthenticated \
            --add-cloudsql-instances=$PROJECT_ID:$REGION:observing-db \
            --set-env-vars=DB_HOST=/cloudsql/$PROJECT_ID:$REGION:observing-db,DB_NAME=observing,DB_USER=appview_runtime,PUBLIC_URL=$PUBLIC_URL,SPECIES_ID_SERVICE_URL=${{ steps.urls.outputs.species_id }},HIDDEN_DIDS=did:plc:jh6n3ntljfhhtr4jbvrm3k5b,ADMIN_DIDS=did:plc:vozr2os4b4sxrxr6opde5js5 \
            --set-secrets=DB_PASSWORD=observing-db-appview-password:latest \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
