version: "0.5"

# Service stack for the ISOLATED dev-env e2e run (scripts/e2e-devenv.ts).
#
# Differences from process-compose.yaml:
#   - species-id is dropped (the create/view flow doesn't need it), so the
#     appview no longer waits on it or sets SPECIES_ID_SERVICE_URL — with that
#     var unset the appview treats species-id as absent.
#   - appview + tap-ingester receive PLC_DIRECTORY_URL / HANDLE_RESOLVER_URL /
#     TAP_RELAY_URL, which the orchestrator sets from the booted dev-env network
#     so all identity + firehose traffic stays local.
#
# Still requires (same as the normal stack): a running Postgres and the `tap`
# binary on PATH. See docs/development.md.

processes:

  migrate:
    command: cargo run -p observing-migrate
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD:-mysecretpassword}@localhost:5432/observing}
    availability:
      restart: "no"

  appview:
    command: cargo run -p observing-appview
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD:-mysecretpassword}@localhost:5432/observing}
      - PORT=3000
      - CACHE_DIR=./cache/media
      - PUBLIC_URL=
      - PLC_DIRECTORY_URL=${PLC_DIRECTORY_URL}
      - HANDLE_RESOLVER_URL=${HANDLE_RESOLVER_URL}
    depends_on:
      migrate:
        condition: process_completed_successfully
    readiness_probe:
      http_get:
        host: localhost
        port: 3000
        path: /health
      initial_delay_seconds: 120
      period_seconds: 5

  tap-ingester:
    command: cargo run -p tap-ingester
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD:-mysecretpassword}@localhost:5432/observing}
      - TAP_DATABASE_URL=${TAP_DATABASE_URL:-sqlite:./.tap-ingester/tap-devenv.db}
      - PORT=8080
      - PLC_DIRECTORY_URL=${PLC_DIRECTORY_URL}
      - TAP_RELAY_URL=${TAP_RELAY_URL}
      - TAP_INHERIT_STDIO=1
    depends_on:
      migrate:
        condition: process_completed_successfully
    readiness_probe:
      http_get:
        host: localhost
        port: 8080
        path: /health
      initial_delay_seconds: 30
      period_seconds: 5

  frontend:
    command: npm run dev
    depends_on:
      appview:
        condition: process_healthy
